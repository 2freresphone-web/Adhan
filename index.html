<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a472a">
<meta name="description" content="Horaires de prière en Algérie avec notifications en temps réel">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Adhan DZ">
<meta name="apple-mobile-web-app-icon-path" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231a472a' width='180' height='180'/><text x='90' y='120' font-size='90' text-anchor='middle' fill='%23d4af37' font-family='Arial' font-weight='bold'>🕌</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a472a' width='100' height='100'/><text x='50' y='75' font-size='50' text-anchor='middle' fill='%23d4af37' font-family='Arial'>🕌</text></svg>">

<title>Adhan DZ - Horaires de Prière</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    background: linear-gradient(135deg, #1a472a 0%, #0d3d22 50%, #051a0f 100%);
    min-height: 100vh;
    padding: 20px;
    padding-bottom: 30px;
}

.overlay {
    background: rgba(0, 0, 0, 0.3);
    min-height: 100vh;
    padding: 20px;
    border-radius: 20px;
}

.container {
    max-width: 500px;
    margin: 0 auto;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    letter-spacing: 2px;
}

.date-time {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
    font-size: 0.95em;
    opacity: 0.9;
    flex-wrap: wrap;
}

.date-time span {
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 15px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

/* Bouton installer PWA */
#install-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #d4af37 0%, #c9a227 100%);
    color: #1a472a;
    border: none;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    transition: all 0.3s ease;
    display: none;
    z-index: 100;
}

#install-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
}

#install-btn:active {
    transform: scale(0.95);
}

/* Sélecteur de ville */
select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #d4af37;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 1em;
    margin-bottom: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

select:hover {
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

select option {
    background: #1a472a;
    color: white;
}

/* Contrôles notifications */
.notification-control {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    background: rgba(255, 255, 255, 0.1);
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(212, 175, 55, 0.3);
}

.notification-toggle {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
}

.notification-toggle input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 26px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: #d4af37;
}

input:checked + .slider:before {
    transform: translateX(24px);
}

.notification-label {
    flex: 1;
    font-size: 0.95em;
    display: flex;
    flex-direction: column;
}

.notification-status {
    font-size: 0.85em;
    opacity: 0.7;
    margin-top: 3px;
}

.status-granted {
    color: #90EE90;
}

.status-denied {
    color: #ff7a7a;
}

/* Prochaine prière */
.next-prayer-card {
    background: linear-gradient(135deg, #d4af37 0%, #c9a227 100%);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    text-align: center;
    color: #1a472a;
    box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
}

.next-prayer-card h3 {
    font-size: 1.2em;
    margin-bottom: 8px;
    opacity: 0.8;
}

.prayer-name {
    font-size: 2.5em;
    font-weight: bold;
    margin: 10px 0;
}

.prayer-time {
    font-size: 1.8em;
    margin: 8px 0;
    font-weight: 600;
}

.countdown {
    font-size: 1em;
    margin-top: 10px;
    opacity: 0.9;
}

/* Grille des prières */
.prayers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
    margin-bottom: 80px;
}

.prayer-card {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(212, 175, 55, 0.3);
    padding: 15px;
    border-radius: 12px;
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
}

.prayer-card:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(212, 175, 55, 0.6);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
}

.prayer-card.active {
    background: rgba(212, 175, 55, 0.2);
    border-color: #d4af37;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}

.prayer-card.completed {
    background: rgba(144, 238, 144, 0.15);
    border-color: rgba(144, 238, 144, 0.5);
}

.prayer-card.completed .prayer-time-card {
    color: #90EE90;
    text-decoration: line-through;
}

.prayer-checkbox {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    cursor: pointer;
    accent-color: #d4af37;
}

.prayer-icon {
    font-size: 2em;
    margin-bottom: 8px;
    margin-top: 15px;
}

.prayer-name-card {
    font-weight: 600;
    font-size: 1.1em;
    margin-bottom: 8px;
    opacity: 0.9;
}

.prayer-time-card {
    font-size: 1.3em;
    font-weight: bold;
    color: #d4af37;
    transition: all 0.3s ease;
}

/* Messages */
.loading {
    text-align: center;
    padding: 20px;
    opacity: 0.8;
}

.error {
    background: rgba(220, 53, 69, 0.2);
    border: 2px solid #dc3545;
    color: #ff7a7a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    margin: 20px 0;
}

.success {
    background: rgba(144, 238, 144, 0.2);
    border: 2px solid #90EE90;
    color: #90EE90;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    margin: 20px 0;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Toast notifications */
.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(212, 175, 55, 0.95);
    color: #1a472a;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    font-weight: bold;
    z-index: 1000;
    animation: toastSlide 0.3s ease;
}

@keyframes toastSlide {
    from {
        opacity: 0;
        transform: translate(-50%, 20px);
    }
    to {
        opacity: 1;
        transform: translate(-50%, 0);
    }
}

/* Responsive */
@media (max-width: 600px) {
    body {
        padding: 10px;
        padding-bottom: 80px;
    }

    .overlay {
        padding: 10px;
        border-radius: 15px;
    }

    h1 {
        font-size: 2em;
    }

    .prayers-grid {
        grid-template-columns: 1fr;
        margin-bottom: 100px;
    }

    .prayer-card {
        padding: 12px;
    }

    .date-time {
        flex-direction: column;
        gap: 10px;
    }

    .next-prayer-card {
        padding: 15px;
    }

    .notification-control {
        flex-direction: column;
    }

    #install-btn {
        bottom: 15px;
        right: 15px;
        padding: 10px 15px;
        font-size: 0.9em;
    }
}

@media (display-mode: standalone) {
    #install-btn {
        display: none !important;
    }
}
</style>
</head>
<body>

<div class="overlay">
<div class="container">

<div class="header">
    <h1>🕌 Adhan DZ</h1>
    <div class="date-time">
        <span id="date"></span>
        <span id="time"></span>
    </div>
</div>

<select id="city">
    <option value="Algiers">Alger</option>
    <option value="Oran">Oran</option>
    <option value="Constantine">Constantine</option>
    <option value="Annaba">Annaba</option>
    <option value="Blida">Blida</option>
    <option value="Setif">Sétif</option>
    <option value="Bejaia">Béjaïa</option>
    <option value="Tipaza">Tipaza</option>
    <option value="Tlemcen">Tlemcen</option>
    <option value="Sidi Bel Abbès">Sidi Bel Abbès</option>
    <option value="Jijel">Jijel</option>
    <option value="Mostaganem">Mostaganem</option>
    <option value="Laghouat">Laghouat</option>
    <option value="Ouargla">Ouargla</option>
    <option value="Batna">Batna</option>
    <option value="Tébessa">Tébessa</option>

<div id="next-prayer" class="next-prayer-card" style="display:none;">
    <h3>Prochaine prière</h3>
    <div class="prayer-name" id="next-name">--</div>
    <div class="prayer-time" id="next-time">--:--</div>
    <div class="countdown" id="countdown">--</div>
</div>

<div class="prayers-grid">
    <div class="prayer-card" data-prayer="Fajr">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌅</div>
        <div class="prayer-name-card">Fajr</div>
        <div class="prayer-time-card" id="Fajr">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Dhuhr">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">☀️</div>
        <div class="prayer-name-card">Dhuhr</div>
        <div class="prayer-time-card" id="Dhuhr">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Asr">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌤️</div>
        <div class="prayer-name-card">Asr</div>
        <div class="prayer-time-card" id="Asr">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Maghrib">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌆</div>
        <div class="prayer-name-card">Maghrib</div>
        <div class="prayer-time-card" id="Maghrib">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Isha">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌙</div>
        <div class="prayer-name-card">Isha</div>
        <div class="prayer-time-card" id="Isha">--:--</div>
    </div>
</div>

</div>
</div>

<button id="install-btn">📲 Installer l'app</button>

<script>
// ========== CONFIG ==========
const prayerIcons = {
    Fajr: '🌅',
    Dhuhr: '☀️',
    Asr: '🌤️',
    Maghrib: '🌆',
    Isha: '🌙'
};

const prayerOrder = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
const arabicNames = {
    Fajr: 'الفجر',
    Dhuhr: 'الظهر',
    Asr: 'العصر',
    Maghrib: 'المغرب',
    Isha: 'العشاء'
};

let allTimes = {};
let notificationsEnabled = false;
let notifiedPrayers = new Set();
let deferredPrompt = null;

// ========== PWA INSTALLATION ==========
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'block';
});

document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
        showToast('✓ App installée avec succès!');
    }
    deferredPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
    showToast('App installée! ✨');
});

// ========== SERVICE WORKER ==========
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {
        console.log('Service Worker registration skipped');
    });
}

// ========== UTILITIES ==========
function showToast(message, duration = 3000) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'toastSlide 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

function loadSavedCity() {
    const saved = localStorage.getItem('selectedCity');
    if (saved) {
        document.getElementById('city').value = saved;
    }
}

function saveCity() {
    localStorage.setItem('selectedCity', document.getElementById('city').value);
}

function loadNotificationState() {
    const saved = localStorage.getItem('notificationsEnabled');
    const enabled = saved === 'true';
    document.getElementById('notif-toggle').checked = enabled;
    notificationsEnabled = enabled;
    updateNotificationStatus();
}

function saveNotificationState() {
    localStorage.setItem('notificationsEnabled', notificationsEnabled);
}

function loadPrayersState() {
    const today = new Date().toISOString().split('T')[0];
    const saved = localStorage.getItem(`prayers-${today}`);
    if (saved) {
        try {
            const completed = JSON.parse(saved);
            Object.keys(completed).forEach(prayer => {
                const card = document.querySelector(`[data-prayer="${prayer}"]`);
                const checkbox = card?.querySelector('.prayer-checkbox');
                if (checkbox) {
                    checkbox.checked = completed[prayer];
                    updatePrayerCard(prayer, completed[prayer]);
                }
            });
        } catch (e) {
            console.log('Error loading prayers state');
        }
    }
}

function savePrayersState() {
    const today = new Date().toISOString().split('T')[0];
    const completed = {};
    prayerOrder.forEach(prayer => {
        const checkbox = document.querySelector(`[data-prayer="${prayer}"] .prayer-checkbox`);
        completed[prayer] = checkbox?.checked || false;
    });
    localStorage.setItem(`prayers-${today}`, JSON.stringify(completed));
}

function updatePrayerCard(prayer, completed) {
    const card = document.querySelector(`[data-prayer="${prayer}"]`);
    if (card) {
        if (completed) {
            card.classList.add('completed');
            showToast(`✓ ${prayer} marquée`);
        } else {
            card.classList.remove('completed');
        }
    }
}

// ========== NOTIFICATIONS ==========
async function requestNotificationPermission() {
    if (!('Notification' in window)) {
        updateNotificationStatus('Non supporté');
        return;
    }

    if (Notification.permission === 'granted') {
        notificationsEnabled = true;
        updateNotificationStatus();
        return;
    }

    if (Notification.permission !== 'denied') {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                notificationsEnabled = true;
                saveNotificationState();
                updateNotificationStatus();
                showToast('Notifications activées ✓');
            } else {
                notificationsEnabled = false;
                updateNotificationStatus();
            }
        } catch (error) {
            console.error('Erreur permission notification:', error);
            notificationsEnabled = false;
            updateNotificationStatus();
        }
    }
}

function updateNotificationStatus() {
    const statusEl = document.getElementById('notif-status');
    const toggle = document.getElementById('notif-toggle');

    if (!('Notification' in window)) {
        statusEl.textContent = 'Non supporté';
        statusEl.className = 'notification-status status-denied';
        toggle.disabled = true;
        return;
    }

    if (Notification.permission === 'granted' && notificationsEnabled) {
        statusEl.textContent = '✓ Activées';
        statusEl.className = 'notification-status status-granted';
        toggle.checked = true;
    } else if (Notification.permission === 'denied') {
        statusEl.textContent = '✗ Bloquées';
        statusEl.className = 'notification-status status-denied';
        toggle.checked = false;
        toggle.disabled = true;
    } else {
        statusEl.textContent = 'Cliquez pour activer';
        statusEl.className = 'notification-status';
        toggle.checked = false;
    }
}

function showNotification(prayerName) {
    if (!notificationsEnabled || !('Notification' in window) || Notification.permission !== 'granted') {
        // Fallback: afficher une alerte visuelle
        if (notificationsEnabled && document.hidden) {
            showToast(`🕌 ${prayerName} - ${allTimes[prayerName]}`);
        }
        return;
    }

    const title = `⏰ ${prayerName} - ${arabicNames[prayerName]}`;
    const options = {
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%231a472a" width="100" height="100"/><text x="50" y="75" font-size="50" text-anchor="middle" fill="%23d4af37" font-family="Arial">🕌</text></svg>',
        badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%231a472a" width="100" height="100"/><text x="50" y="75" font-size="50" text-anchor="middle" fill="%23d4af37" font-family="Arial">🕌</text></svg>',
        body: `Il est l'heure de la prière - ${allTimes[prayerName]}`,
        tag: `prayer-${prayerName}`,
        requireInteraction: true,
        vibrate: [200, 100, 200],
        actions: [
            { action: 'close', title: 'Fermer' }
        ]
    };

    try {
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
                type: 'SHOW_NOTIFICATION',
                title: title,
                options: options
            });
        } else {
            new Notification(title, options);
        }
        playNotificationSound();
    } catch (error) {
        console.error('Erreur notification:', error);
    }
}

function playNotificationSound() {
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        // Mélodie simple
        oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
    } catch (error) {
        console.log('Son non disponible sur ce navigateur');
    }
}

// ========== TIME & DATE ==========
function updateDateTime() {
    const now = new Date();
    
    const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateStr = now.toLocaleDateString('fr-FR', dateOpts);
    document.getElementById('date').textContent = dateStr;
    
    const timeStr = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('time').textContent = timeStr;
}

function timeToMinutes(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

// ========== PRAYERS LOGIC ==========
function getNextPrayer() {
    const now = new Date();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    
    let nextPrayer = null;
    let nextTime = null;
    let minDiff = Infinity;
    
    for (let prayer of prayerOrder) {
        const prayerMinutes = timeToMinutes(allTimes[prayer]);
        let diff = prayerMinutes - currentMinutes;
        
        if (diff > 0 && diff < minDiff) {
            minDiff = diff;
            nextPrayer = prayer;
            nextTime = allTimes[prayer];
        }
    }
    
    if (!nextPrayer) {
        nextPrayer = 'Fajr';
        nextTime = allTimes['Fajr'];
    }
    
    return { prayer: nextPrayer, time: nextTime, minutesLeft: minDiff };
}

function updateCountdown() {
    const next = getNextPrayer();
    const nextPrayerCard = document.getElementById('next-prayer');
    
    if (next.minutesLeft !== Infinity) {
        nextPrayerCard.style.display = 'block';
        
        const hours = Math.floor(next.minutesLeft / 60);
        const minutes = next.minutesLeft % 60;
        
        document.getElementById('next-name').textContent = next.prayer;
        document.getElementById('next-time').textContent = next.time;
        document.getElementById('countdown').textContent = 
            hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
        
        document.querySelectorAll('.prayer-card').forEach(card => {
            card.classList.remove('active');
        });
        const activeCard = document.querySelector(`[data-prayer="${next.prayer}"]`);
        if (activeCard) activeCard.classList.add('active');

        if (minutes === 0 && !notifiedPrayers.has(next.prayer)) {
            showNotification(next.prayer);
            notifiedPrayers.add(next.prayer);
        }
    }
}

function resetNotifications() {
    const now = new Date();
    if (now.getHours() === 0 && now.getMinutes() === 0) {
        notifiedPrayers.clear();
    }
}

async function loadTimes() {
    const city = document.getElementById('city').value;
    const errorDiv = document.getElementById('error-msg');
    
    try {
        errorDiv.innerHTML = '';
        
        const res = await fetch(
            `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Algeria&method=19`,
            { method: 'GET', mode: 'cors' }
        );
        
        if (!res.ok) throw new Error('Erreur API');
        
        const data = await res.json();
        
        if (!data.data || !data.data.timings) {
            throw new Error('Données invalides');
        }
        
        const t = data.data.timings;
        allTimes = {
            Fajr: t.Fajr,
            Dhuhr: t.Dhuhr,
            Asr: t.Asr,
            Maghrib: t.Maghrib,
            Isha: t.Isha
        };
        
        for (let prayer of prayerOrder) {
            document.getElementById(prayer).textContent = allTimes[prayer];
        }
        
        notifiedPrayers.clear();
        updateCountdown();
        saveCity();
        loadPrayersState();
        
    } catch (error) {
        errorDiv.innerHTML = `<div class="error">⚠️ Erreur de chargement. Vérifiez votre connexion.</div>`;
        console.error(error);
    }
}

// ========== EVENT LISTENERS ==========
document.getElementById('city').addEventListener('change', loadTimes);

document.getElementById('notif-toggle').addEventListener('change', async (e) => {
    if (e.target.checked) {
        await requestNotificationPermission();
        if (!notificationsEnabled) {
            e.target.checked = false;
        } else {
            notificationsEnabled = true;
        }
    } else {
        notificationsEnabled = false;
    }
    saveNotificationState();
    updateNotificationStatus();
});

// Checkboxes prières
document.querySelectorAll('.prayer-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', (e) => {
        const prayer = e.target.closest('.prayer-card').dataset.prayer;
        updatePrayerCard(prayer, e.target.checked);
        savePrayersState();
    });
});

// ========== INITIALIZATION ==========
setInterval(updateDateTime, 1000);
setInterval(() => {
    updateCountdown();
    resetNotifications();
}, 60000);

loadSavedCity();
loadNotificationState();
updateDateTime();
loadTimes();

if ('Notification' in window) {
    updateNotificationStatus();
}

// Vibration support check
if ('vibrate' in navigator) {
    console.log('Vibration API supportée');
}
</script>

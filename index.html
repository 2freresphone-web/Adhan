<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#228c52">
<meta name="description" content="Horaires de prière en Algérie avec notifications">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Adhan DZ">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23228c52' width='100' height='100'/><text x='50' y='75' font-size='50' text-anchor='middle' fill='%23FFD700'>🕌</text></svg>">
<title>Adhan DZ</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    background: linear-gradient(135deg, rgba(10, 80, 40, 0.75) 0%, rgba(5, 50, 25, 0.75) 100%),
                url('https://images.unsplash.com/photo-1609524586309-30e7ec41c15d?q=80&w=2000') center/cover no-repeat fixed;
    background-attachment: fixed;
    min-height: 100vh;
    padding: 20px;
    padding-bottom: 30px;
}

.overlay {
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0.4) 100%);
    min-height: 100vh;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(2px);
}

.container { max-width: 500px; margin: 0 auto; }

.header {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    letter-spacing: 2px;
}

.date-time {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
    font-size: 0.95em;
    opacity: 0.9;
    flex-wrap: wrap;
}

.date-time span {
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 15px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #FFD700;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    font-size: 1em;
    margin-bottom: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

select:hover { background: rgba(0, 0, 0, 0.6); }
select option { background: #1a472a; color: white; }

.controls-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
}

.control-item {
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    padding: 12px;
    border-radius: 10px;
    border: 2px solid rgba(255, 215, 0, 0.5);
    backdrop-filter: blur(5px);
}

.toggle {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
}

.toggle input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 26px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: #FFD700;
}

input:checked + .slider:before {
    transform: translateX(24px);
}

.label-text {
    flex: 1;
    font-size: 0.95em;
    display: flex;
    flex-direction: column;
}

.status {
    font-size: 0.85em;
    opacity: 0.7;
    margin-top: 3px;
}

.next-prayer-card {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.95) 0%, rgba(255, 199, 0, 0.95) 100%);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    text-align: center;
    color: #1a472a;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

.next-prayer-card h3 { font-size: 1.2em; margin-bottom: 8px; opacity: 0.8; }
.prayer-name { font-size: 2.5em; font-weight: bold; margin: 10px 0; }
.prayer-time { font-size: 1.8em; margin: 8px 0; font-weight: 600; }
.countdown { font-size: 1em; margin-top: 10px; opacity: 0.9; }

.prayers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
    margin-bottom: 80px;
}

.prayer-card {
    background: rgba(0, 0, 0, 0.3);
    border: 2px solid rgba(255, 215, 0, 0.4);
    padding: 15px;
    border-radius: 12px;
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
    backdrop-filter: blur(5px);
}

.prayer-card:hover {
    background: rgba(0, 0, 0, 0.4);
    border-color: rgba(255, 215, 0, 0.7);
    transform: translateY(-2px);
}

.prayer-card.active {
    background: rgba(255, 215, 0, 0.2);
    border-color: #FFD700;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

.prayer-card.completed {
    background: rgba(144, 238, 144, 0.15);
    border-color: rgba(144, 238, 144, 0.5);
}

.prayer-checkbox {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    cursor: pointer;
    accent-color: #FFD700;
}

.prayer-icon { font-size: 2em; margin-bottom: 8px; margin-top: 15px; }
.prayer-name { font-weight: 600; font-size: 1.1em; margin-bottom: 8px; opacity: 0.9; }
.prayer-time { font-size: 1.3em; font-weight: bold; color: #FFD700; }
.prayer-card.completed .prayer-time { color: #90EE90; text-decoration: line-through; }

.error {
    background: rgba(220, 53, 69, 0.2);
    border: 2px solid #dc3545;
    color: #ff7a7a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    margin: 20px 0;
}

.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 215, 0, 0.95);
    color: #1a472a;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    font-weight: bold;
    z-index: 1000;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
}

#install-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #FFD700 0%, #FFC700 100%);
    color: #1a472a;
    border: none;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
    transition: all 0.3s ease;
    display: none;
    z-index: 100;
}

#install-btn:hover { transform: scale(1.05); }
#install-btn:active { transform: scale(0.95); }

@media (max-width: 600px) {
    body { padding: 10px; padding-bottom: 80px; }
    .overlay { padding: 10px; border-radius: 15px; }
    h1 { font-size: 2em; }
    .prayers-grid { grid-template-columns: 1fr; margin-bottom: 100px; }
    .prayer-card { padding: 12px; }
    .date-time { flex-direction: column; gap: 10px; }
}

@media (display-mode: standalone) {
    #install-btn { display: none !important; }
}
</style>
</head>
<body>

<div class="overlay">
<div class="container">

<div class="header">
    <h1>🕌 Adhan DZ</h1>
    <div class="date-time">
        <span id="date"></span>
        <span id="time"></span>
    </div>
</div>

<select id="city">
    <option value="Algiers">Alger</option>
    <option value="Oran">Oran</option>
    <option value="Constantine">Constantine</option>
    <option value="Annaba">Annaba</option>
    <option value="Blida">Blida</option>
    <option value="Setif">Sétif</option>
    <option value="Bejaia">Béjaïa</option>
    <option value="Tipaza">Tipaza</option>
    <option value="Tlemcen">Tlemcen</option>
    <option value="Sidi Bel Abbès">Sidi Bel Abbès</option>
    <option value="Jijel">Jijel</option>
    <option value="Mostaganem">Mostaganem</option>
    <option value="Laghouat">Laghouat</option>
    <option value="Ouargla">Ouargla</option>
    <option value="Batna">Batna</option>
    <option value="Tébessa">Tébessa</option>
    <option value="Khenchela">Khenchela</option>
    <option value="Skikda">Skikda</option>
    <option value="Médéa">Médéa</option>
    <option value="Tamanrasset">Tamanrasset</option>
</select>

<div class="controls-section">
    <div class="control-item">
        <label class="toggle">
            <input type="checkbox" id="notif-toggle" />
            <span class="slider"></span>
        </label>
        <div class="label-text">
            <span>🔔 Notifications</span>
            <span class="status" id="notif-status">Activez pour recevoir les alertes</span>
        </div>
    </div>

    <div class="control-item">
        <label class="toggle">
            <input type="checkbox" id="sound-toggle" checked />
            <span class="slider"></span>
        </label>
        <div class="label-text">
            <span>🎵 Son d'Adhan</span>
            <span class="status" id="sound-status">✓ Activé</span>
        </div>
    </div>
</div>

<div id="error-msg"></div>

<div id="next-prayer" class="next-prayer-card" style="display:none;">
    <h3>Prochaine prière</h3>
    <div class="prayer-name" id="next-name">--</div>
    <div class="prayer-time" id="next-time">--:--</div>
    <div class="countdown" id="countdown">--</div>
</div>

<div class="prayers-grid">
    <div class="prayer-card" data-prayer="Fajr">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌅</div>
        <div class="prayer-name">Fajr</div>
        <div class="prayer-time" id="Fajr">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Dhuhr">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">☀️</div>
        <div class="prayer-name">Dhuhr</div>
        <div class="prayer-time" id="Dhuhr">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Asr">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌤️</div>
        <div class="prayer-name">Asr</div>
        <div class="prayer-time" id="Asr">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Maghrib">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌆</div>
        <div class="prayer-name">Maghrib</div>
        <div class="prayer-time" id="Maghrib">--:--</div>
    </div>
    <div class="prayer-card" data-prayer="Isha">
        <input type="checkbox" class="prayer-checkbox" />
        <div class="prayer-icon">🌙</div>
        <div class="prayer-name">Isha</div>
        <div class="prayer-time" id="Isha">--:--</div>
    </div>
</div>

</div>
</div>

<button id="install-btn">📲 Installer l'app</button>

<script>
// ========== VARIABLES GLOBALES ==========
const PRAYER_ORDER = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
const ARABIC_NAMES = { Fajr: 'الفجر', Dhuhr: 'الظهر', Asr: 'العصر', Maghrib: 'المغرب', Isha: 'العشاء' };

let prayers = {};
let notificationsEnabled = false;
let soundEnabled = true;
let notifiedToday = new Set();
let deferredPrompt = null;

// ========== UTILITAIRES ==========
function showToast(msg, duration = 3000) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.animation = 'slideIn 0.3s ease reverse'; }, duration);
    setTimeout(() => toast.remove(), duration + 300);
}

function save(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
}

function load(key, defaultValue) {
    const saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : defaultValue;
}

// ========== HORAIRES DE PRIÈRE ==========
async function loadPrayers() {
    const city = document.getElementById('city').value;
    const errorDiv = document.getElementById('error-msg');
    errorDiv.innerHTML = '';

    try {
        const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Algeria&method=19`);
        if (!response.ok) throw new Error('API error');
        
        const data = await response.json();
        const timings = data.data.timings;
        
        prayers = {
            Fajr: timings.Fajr,
            Dhuhr: timings.Dhuhr,
            Asr: timings.Asr,
            Maghrib: timings.Maghrib,
            Isha: timings.Isha
        };

        PRAYER_ORDER.forEach(p => {
            document.getElementById(p).textContent = prayers[p];
        });

        notifiedToday.clear();
        updateCountdown();
        save('city', city);
        showToast(`✓ ${city}`);

    } catch (error) {
        errorDiv.innerHTML = `<div class="error">⚠️ Erreur: ${error.message}</div>`;
        console.error(error);
    }
}

function updateCountdown() {
    const now = new Date();
    const currentMin = now.getHours() * 60 + now.getMinutes();
    
    let nextPrayer = null;
    let minDiff = Infinity;

    PRAYER_ORDER.forEach(p => {
        const [h, m] = prayers[p].split(':').map(Number);
        const prayerMin = h * 60 + m;
        const diff = prayerMin - currentMin;
        if (diff > 0 && diff < minDiff) {
            minDiff = diff;
            nextPrayer = p;
        }
    });

    if (!nextPrayer) {
        nextPrayer = 'Fajr';
        minDiff = 24 * 60 - currentMin + 5 * 60; // Approximation pour demain
    }

    document.getElementById('next-name').textContent = nextPrayer;
    document.getElementById('next-time').textContent = prayers[nextPrayer];
    const hrs = Math.floor(minDiff / 60);
    const mins = minDiff % 60;
    document.getElementById('countdown').textContent = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
    document.getElementById('next-prayer').style.display = 'block';

    // Mettre à jour les cartes actives
    document.querySelectorAll('.prayer-card').forEach(card => card.classList.remove('active'));
    const card = document.querySelector(`[data-prayer="${nextPrayer}"]`);
    if (card) card.classList.add('active');

    // Notifier
    if (minDiff === 0 && !notifiedToday.has(nextPrayer)) {
        notifiedToday.add(nextPrayer);
        if (notificationsEnabled) showNotification(nextPrayer);
        if (soundEnabled) playAdhan();
    }
}

// ========== NOTIFICATIONS ==========
async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
        notificationsEnabled = true;
        return;
    }
    if (Notification.permission !== 'denied') {
        const perm = await Notification.requestPermission();
        notificationsEnabled = perm === 'granted';
    }
    save('notificationsEnabled', notificationsEnabled);
    updateNotifStatus();
}

function updateNotifStatus() {
    const status = document.getElementById('notif-status');
    const toggle = document.getElementById('notif-toggle');

    if (!('Notification' in window)) {
        status.textContent = 'Non supporté';
        toggle.disabled = true;
        return;
    }

    if (Notification.permission === 'granted') {
        status.textContent = '✓ Activées';
        toggle.checked = true;
        notificationsEnabled = true;
    } else if (Notification.permission === 'denied') {
        status.textContent = '✗ Bloquées';
        toggle.checked = false;
        toggle.disabled = true;
        notificationsEnabled = false;
    } else {
        status.textContent = 'Activez pour recevoir les alertes';
        toggle.checked = load('notificationsEnabled', false);
    }
}

function showNotification(prayer) {
    if (Notification.permission !== 'granted') return;
    new Notification(`${prayer} - ${ARABIC_NAMES[prayer]}`, {
        icon: '🕌',
        body: `Hora de rezar: ${prayers[prayer]}`,
        tag: prayer
    });
}

// ========== SON ==========
function playAdhan() {
    if (!soundEnabled) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [
            { f: 392, d: 0.8 }, { f: 440, d: 0.6 }, { f: 392, d: 0.8 }, { f: 349, d: 0.6 },
            { f: 440, d: 0.8 }, { f: 494, d: 0.8 }, { f: 523, d: 1.0 }, { f: 587, d: 1.2 },
            { f: 659, d: 1.0 }, { f: 587, d: 0.8 }, { f: 523, d: 1.0 }, { f: 494, d: 0.8 },
            { f: 440, d: 0.9 }, { f: 392, d: 1.0 }, { f: 349, d: 1.2 }, { f: 329, d: 1.5 }
        ];

        let t = ctx.currentTime;
        notes.forEach(n => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = n.f;
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + n.d);
            osc.start(t);
            osc.stop(t + n.d);
            t += n.d;
        });
    } catch (e) { console.log('Son non disponible'); }
}

// ========== DATE & HEURE ==========
function updateTime() {
    const now = new Date();
    document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('time').textContent = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// ========== PWA ==========
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'block';
});

document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') showToast('✓ App installée!');
    deferredPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(r => {
            console.log('✓ Service Worker enregistré');
        }).catch(e => console.log('Service Worker erreur:', e));
    });
}

// ========== EVENT LISTENERS ==========
document.getElementById('city').addEventListener('change', loadPrayers);

document.getElementById('notif-toggle').addEventListener('change', async e => {
    if (e.target.checked) {
        await requestNotifPermission();
        if (!notificationsEnabled) e.target.checked = false;
    } else {
        notificationsEnabled = false;
        save('notificationsEnabled', false);
    }
    updateNotifStatus();
});

document.getElementById('sound-toggle').addEventListener('change', e => {
    soundEnabled = e.target.checked;
    save('soundEnabled', soundEnabled);
    document.getElementById('sound-status').textContent = soundEnabled ? '✓ Activé' : '✗ Désactivé';
});

document.querySelectorAll('.prayer-checkbox').forEach(cb => {
    cb.addEventListener('change', e => {
        const prayer = e.target.closest('.prayer-card').dataset.prayer;
        const card = e.target.closest('.prayer-card');
        if (e.target.checked) {
            card.classList.add('completed');
            showToast(`✓ ${prayer}`);
        } else {
            card.classList.remove('completed');
        }
    });
});

// ========== INITIALIZATION ==========
document.addEventListener('DOMContentLoaded', async () => {
    // Charger les paramètres
    const savedCity = load('city', 'Algiers');
    document.getElementById('city').value = savedCity;
    
    notificationsEnabled = load('notificationsEnabled', false);
    soundEnabled = load('soundEnabled', true);
    document.getElementById('sound-toggle').checked = soundEnabled;

    // Mettre à jour l'UI
    updateTime();
    updateNotifStatus();
    document.getElementById('sound-status').textContent = soundEnabled ? '✓ Activé' : '✗ Désactivé';

    // Charger les horaires
    await loadPrayers();
    
    // Mises à jour en temps réel
    setInterval(updateTime, 1000);
    setInterval(updateCountdown, 60000);
});
</script>

</body>
</html>

<title>Adhan DZ - Horaires de Prière</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    background: linear-gradient(135deg, rgba(10, 80, 40, 0.75) 0%, rgba(5, 50, 25, 0.75) 100%),
                url('https://images.unsplash.com/photo-1609524586309-30e7ec41c15d?q=80&w=2000') center/cover no-repeat fixed;
    background-attachment: fixed;
    background-size: cover;
    min-height: 100vh;
    padding: 20px;
    padding-bottom: 30px;
    position: relative;
}

.overlay {
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0.4) 100%);
    min-height: 100vh;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(2px);
}

.container {
    max-width: 500px;
    margin: 0 auto;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    letter-spacing: 2px;
}

.date-time {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
    font-size: 0.95em;
    opacity: 0.9;
    flex-wrap: wrap;
}

.date-time span {
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 15px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

/* Bouton installer PWA */
#install-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #FFD700 0%, #FFC700 100%);
    color: #1a472a;
    border: none;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    transition: all 0.3s ease;
    display: none;
    z-index: 100;
}

#install-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
}

#install-btn:active {
    transform: scale(0.95);
}

/* Sélecteur de ville */
select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #FFD700;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    font-size: 1em;
    margin-bottom: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

select:hover {
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

select option {
    background: #1a472a;
    color: white;
}

/* Contrôles */
.controls-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
}

.notification-control, .sound-control {
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    padding: 12px;
    border-radius: 10px;
    border: 2px solid rgba(255, 215, 0, 0.5);
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

.notification-toggle {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
}

.notification-toggle input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 26px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: #FFD700;
}

input:checked + .slider:before {
    transform: translateX(24px);
}

.notification-label {
    flex: 1;
    font-size: 0.95em;
    display: flex;
    flex-direction: column;
}

.notification-status {
    font-size: 0.85em;
    opacity: 0.7;
    margin-top: 3px;
}

.status-granted {
    color: #90EE90;
}

.status-denied {
    color: #ff7a7a;
}

/* Prochaine prière */
.next-prayer-card {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.95) 0%, rgba(201, 162, 39, 0.95) 100%);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    text-align: center;
    color: #1a472a;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.4);
    backdrop-filter: blur(10px);
}

.next-prayer-card h3 {
    font-size: 1.2em;
    margin-bottom: 8px;
    opacity: 0.8;
}

.prayer-name {
    font-size: 2.5em;
    font-weight: bold;
    margin: 10px 0;
}

.prayer-time {
    font-size: 1.8em;
    margin: 8px 0;
    font-weight: 600;
}

.countdown {
    font-size: 1em;
    margin-top: 10px;
    opacity: 0.9;
}

/* Grille des prières */
.prayers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
    margin-bottom: 80px;
}

.prayer-card {
    background: rgba(0, 0, 0, 0.3);
    border: 2px solid rgba(212, 175, 55, 0.4);
    padding: 15px;
    border-radius: 12px;
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
    backdrop-filter: blur(5px);
}

.prayer-card:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(212, 175, 55, 0.6);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
}

.prayer-card.active {
    background: rgba(212, 175, 55, 0.2);
    border-color: #FFD700;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}

.prayer-card.completed {
    background: rgba(144, 238, 144, 0.15);
    border-color: rgba(144, 238, 144, 0.5);
}

.prayer-card.completed .prayer-time-card {
    color: #90EE90;
    text-decoration: line-through;
}

.prayer-checkbox {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    cursor: pointer;
    accent-color: #FFD700;
}

.prayer-icon {
    font-size: 2em;
    margin-bottom: 8px;
    margin-top: 15px;
}

.prayer-name-card {
    font-weight: 600;
    font-size: 1.1em;
    margin-bottom: 8px;
    opacity: 0.9;
}

.prayer-time-card {
    font-size: 1.3em;
    font-weight: bold;
    color: #FFD700;
    transition: all 0.3s ease;
}

/* Messages */
.loading {
    text-align: center;
    padding: 20px;
    opacity: 0.8;
}

.error {
    background: rgba(220, 53, 69, 0.2);
    border: 2px solid #dc3545;
    color: #ff7a7a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    margin: 20px 0;
}

.success {
    background: rgba(144, 238, 144, 0.2);
    border: 2px solid #90EE90;
    color: #90EE90;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    margin: 20px 0;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Toast notifications */
.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(212, 175, 55, 0.95);
    color: #1a472a;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    font-weight: bold;
    z-index: 1000;
    animation: toastSlide 0.3s ease;
}

@keyframes toastSlide {
    from {
        opacity: 0;
        transform: translate(-50%, 20px);
    }
    to {
        opacity: 1;
        transform: translate(-50%, 0);
    }
}

/* Responsive */
@media (max-width: 600px) {
    body {
        padding: 10px;
        padding-bottom: 80px;
    }

    .overlay {
        padding: 10px;
        border-radius: 15px;
    }

    h1 {
        font-size: 2em;
    }

    .prayers-grid {
        grid-template-columns: 1fr;
        margin-bottom: 100px;
    }

    .prayer-card {
        padding: 12px;
    }

    .date-time {
        flex-direction: column;
        gap: 10px;
    }

    .next-prayer-card {
        padding: 15px;
    }

    .notification-control {
        flex-direction: column;
    }

    #install-btn {
        bottom: 15px;
        right: 15px;
        padding: 10px 15px;
        font-size: 0.9em;
    }
}

@media (display-mode: standalone) {
    #install-btn {
        display: none !important;
    }
}
</style>
</head>

<script>
// ========== CONFIG ==========
const prayerIcons = {
    Fajr: '🌅',
    Dhuhr: '☀️',
    Asr: '🌤️',
    Maghrib: '🌆',
    Isha: '🌙'
};

const prayerOrder = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
const arabicNames = {
    Fajr: 'الفجر',
    Dhuhr: 'الظهر',
    Asr: 'العصر',
    Maghrib: 'المغرب',
    Isha: 'العشاء'
};

let allTimes = {};
let notificationsEnabled = false;
let soundEnabled = true;
let notifiedPrayers = new Set();
let deferredPrompt = null;
let adhanType = 'default'; // Type d'Adhan sélectionné

// ========== PWA INSTALLATION ==========
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'block';
});

document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
        showToast('✓ App installée avec succès!');
    }
    deferredPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
    showToast('App installée! ✨');
});

// ========== SERVICE WORKER ==========
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(registration => {
                console.log('Service Worker enregistré:', registration);
                // Vérifier les mises à jour
                registration.addEventListener('updatefound', () => {
                    console.log('Mise à jour disponible');
                    showToast('📲 Mise à jour disponible');
                });
            })
            .catch(error => {
                console.log('Service Worker erreur:', error);
            });
    });
}

// ========== UTILITIES ==========
function showToast(message, duration = 3000) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'toastSlide 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

function loadSoundState() {
    const saved = localStorage.getItem('soundEnabled');
    soundEnabled = saved !== 'false';
    document.getElementById('sound-toggle').checked = soundEnabled;
    updateSoundStatus();
}

function saveSoundState() {
    localStorage.setItem('soundEnabled', soundEnabled);
}

function updateSoundStatus() {
    const statusEl = document.getElementById('sound-status');
    if (soundEnabled) {
        statusEl.textContent = '✓ Activé';
        statusEl.className = 'notification-status status-granted';
    } else {
        statusEl.textContent = '✗ Désactivé';
        statusEl.className = 'notification-status status-denied';
    }
}

function playAdhanChant() {
    if (!soundEnabled) return;
    
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Mélodie d'Adhan magnifique
        const notes = [
            { freq: 523, duration: 0.4 },   // C5
            { freq: 587, duration: 0.4 },   // D5
            { freq: 659, duration: 0.4 },   // E5
            { freq: 784, duration: 0.6 },   // G5
            { freq: 880, duration: 0.8 },   // A5
            { freq: 784, duration: 0.4 },   // G5
            { freq: 659, duration: 0.4 },   // E5
            { freq: 587, duration: 0.4 },   // D5
            { freq: 523, duration: 1.0 },   // C5
        ];
        
        let currentTime = audioContext.currentTime;
        
        notes.forEach(note => {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(note.freq, currentTime);
            
            gain.gain.setValueAtTime(0.3, currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, currentTime + note.duration * 0.9);
            
            osc.start(currentTime);
            osc.stop(currentTime + note.duration);
            
            currentTime += note.duration;
        });
    } catch (error) {
        console.log('Son non disponible');
    }
}

function playAdhanChant() {
    if (!soundEnabled) return;
    
    const type = document.getElementById('adhan-select')?.value || adhanType || 'default';
    
    switch(type) {
        case 'melodic':
            playAdhanMelodicVersion();
            break;
        case 'fast':
            playAdhanFastVersion();
            break;
        case 'default':
        default:
            playAdhanTraditional();
    }
}

// Adhan Traditionnel - Classique et authentique
function playAdhanTraditional() {
    if (!soundEnabled) return;
    
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Adhan traditionnel complet - Appel à la prière authentique
        // Basé sur l'Adhan de la Grande Mosquée de La Mecque
        const notes = [
            // Allahu Akbar x4 (doux et solennel)
            { freq: 293, duration: 1.2, volume: 0.4 },
            { freq: 329, duration: 1.0, volume: 0.4 },
            { freq: 293, duration: 1.2, volume: 0.4 },
            { freq: 261, duration: 1.0, volume: 0.4 },
            
            // Ashadu an la ilaha illallah
            { freq: 329, duration: 1.0, volume: 0.45 },
            { freq: 392, duration: 1.2, volume: 0.45 },
            { freq: 440, duration: 1.5, volume: 0.45 },
            { freq: 494, duration: 1.8, volume: 0.45 },
            
            // Ashadu anna Muhammad rasulullah
            { freq: 523, duration: 1.5, volume: 0.5 },
            { freq: 587, duration: 1.2, volume: 0.5 },
            { freq: 523, duration: 1.5, volume: 0.5 },
            
            // Hayya alas salah
            { freq: 494, duration: 1.0, volume: 0.45 },
            { freq: 440, duration: 1.0, volume: 0.45 },
            { freq: 392, duration: 1.2, volume: 0.45 },
            { freq: 349, duration: 1.5, volume: 0.45 },
            
            // Hayya alal falah
            { freq: 392, duration: 1.0, volume: 0.45 },
            { freq: 349, duration: 1.2, volume: 0.45 },
            { freq: 329, duration: 1.5, volume: 0.45 },
            
            // Allahu Akbar final
            { freq: 293, duration: 1.2, volume: 0.4 },
            { freq: 329, duration: 1.0, volume: 0.4 },
            { freq: 293, duration: 1.5, volume: 0.4 },
        ];
        
        playAdhanNotes(audioContext, notes);
        
    } catch (error) {
        console.log('Erreur Adhan traditionnel:', error);
    }
}

// Adhan Mélodique - Plus musical et varié
function playAdhanMelodicVersion() {
    if (!soundEnabled) return;
    
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Adhan avec variations mélodiques
        const notes = [
            { freq: 349, duration: 0.8, volume: 0.45 },
            { freq: 392, duration: 0.9, volume: 0.45 },
            { freq: 349, duration: 0.8, volume: 0.45 },
            
            { freq: 440, duration: 1.0, volume: 0.5 },
            { freq: 494, duration: 1.1, volume: 0.5 },
            { freq: 523, duration: 1.3, volume: 0.5 },
            { freq: 587, duration: 1.5, volume: 0.5 },
            
            { freq: 659, duration: 1.2, volume: 0.52 },
            { freq: 698, duration: 1.0, volume: 0.52 },
            { freq: 659, duration: 1.2, volume: 0.52 },
            { freq: 587, duration: 1.0, volume: 0.52 },
            
            { freq: 523, duration: 0.9, volume: 0.5 },
            { freq: 494, duration: 1.0, volume: 0.5 },

// Fonction générique pour jouer les notes d'Adhan avec vibrato
function playAdhanNotes(audioContext, notes) {
    let currentTime = audioContext.currentTime;
    
    notes.forEach((note) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const vibrato = audioContext.createOscillator();
        const vibratoGain = audioContext.createGain();
        
        osc.connect(gain);
        vibrato.connect(vibratoGain);
        vibratoGain.connect(osc.frequency);
        gain.connect(audioContext.destination);
        
        osc.type = 'sine';
        vibrato.type = 'sine';
        vibrato.frequency.setValueAtTime(4.5, currentTime); // Vibrato naturel
        vibratoGain.gain.setValueAtTime(12, currentTime);
        
        osc.frequency.setValueAtTime(note.freq, currentTime);
        
        // Envelope authentique
        const attackTime = note.duration * 0.15;
        const decayTime = note.duration * 0.2;
        const releaseTime = note.duration * 0.65;
        
        gain.gain.setValueAtTime(0.01, currentTime);
        gain.gain.linearRampToValueAtTime(note.volume, currentTime + attackTime);
        gain.gain.exponentialRampToValueAtTime(note.volume * 0.8, currentTime + attackTime + decayTime);
        gain.gain.exponentialRampToValueAtTime(0.02, currentTime + note.duration);
        
        osc.start(currentTime);
        vibrato.start(currentTime);
        osc.stop(currentTime + note.duration);
        vibrato.stop(currentTime + note.duration);
        
        currentTime += note.duration;
    });
}

        notificationsEnabled = true;
        document.getElementById('notif-toggle').checked = true;
        localStorage.setItem('notificationsEnabled', 'true');
    } 
    // Si refusées, désactiver

        document.getElementById('notif-toggle').checked = false;

    }

// ========== NOTIFICATIONS ==========
async function requestNotificationPermission() {
    if (!('Notification' in window)) {
        updateNotificationStatus('Non supporté');
        return;
    }

    if (Notification.permission === 'granted') {
        notificationsEnabled = true;
        updateNotificationStatus();
        return;
    }

    if (Notification.permission !== 'denied') {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                notificationsEnabled = true;
                saveNotificationState();
                updateNotificationStatus();
                showToast('Notifications activées ✓');
            } else {
                notificationsEnabled = false;
                updateNotificationStatus();
            }
        } catch (error) {
            console.error('Erreur permission notification:', error);
            notificationsEnabled = false;
            updateNotificationStatus();
        }
    }
}

function updateNotificationStatus() {
    const statusEl = document.getElementById('notif-status');
    const toggle = document.getElementById('notif-toggle');

    if (!('Notification' in window)) {
        statusEl.textContent = 'Non supporté';
        statusEl.className = 'notification-status status-denied';
        toggle.disabled = true;
        toggle.checked = false;
        return;
    }

    // Synchroniser avec l'état réel des permissions
    if (Notification.permission === 'granted') {
        statusEl.textContent = '✓ Activées';
        statusEl.className = 'notification-status status-granted';
        toggle.disabled = false;
        toggle.checked = true;
        notificationsEnabled = true;
    } else if (Notification.permission === 'denied') {
        statusEl.textContent = '✗ Bloquées (paramètres navigateur)';
        statusEl.className = 'notification-status status-denied';
        toggle.disabled = true;
        toggle.checked = false;
        notificationsEnabled = false;
    } else {
        // Permission par défaut
        const enabled = localStorage.getItem('notificationsEnabled') === 'true';
        statusEl.textContent = enabled ? 'Clic pour confirmer' : 'Cliquez pour activer';
        statusEl.className = 'notification-status';
        toggle.disabled = false;
        toggle.checked = enabled;
        notificationsEnabled = enabled;
    }
}

    };

    }
}

function timeToMinutes(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

// ========== PRAYERS LOGIC ==========
function getNextPrayer() {
    const now = new Date();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    
    let nextPrayer = null;
    let nextTime = null;
    let minDiff = Infinity;
    
    for (let prayer of prayerOrder) {
        const prayerMinutes = timeToMinutes(allTimes[prayer]);
        let diff = prayerMinutes - currentMinutes;
        
        if (diff > 0 && diff < minDiff) {
            minDiff = diff;
            nextPrayer = prayer;
            nextTime = allTimes[prayer];
        }
    }
    
    if (!nextPrayer) {
        nextPrayer = 'Fajr';
        nextTime = allTimes['Fajr'];
    }
    
    return { prayer: nextPrayer, time: nextTime, minutesLeft: minDiff };
}

function updateCountdown() {
    const next = getNextPrayer();
    const nextPrayerCard = document.getElementById('next-prayer');
    
    if (next.minutesLeft !== Infinity) {
        nextPrayerCard.style.display = 'block';
        
        const hours = Math.floor(next.minutesLeft / 60);
        const minutes = next.minutesLeft % 60;
        
        document.getElementById('next-name').textContent = next.prayer;
        document.getElementById('next-time').textContent = next.time;
        document.getElementById('countdown').textContent = 
            hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
        
        document.querySelectorAll('.prayer-card').forEach(card => {
            card.classList.remove('active');
        });
        const activeCard = document.querySelector(`[data-prayer="${next.prayer}"]`);
        if (activeCard) activeCard.classList.add('active');

        if (minutes === 0 && !notifiedPrayers.has(next.prayer)) {
            showNotification(next.prayer);
            notifiedPrayers.add(next.prayer);
        }
    }
}

function resetNotifications() {
    const now = new Date();
    if (now.getHours() === 0 && now.getMinutes() === 0) {
        notifiedPrayers.clear();
    }
}

async function loadTimes(retries = 0) {
    const city = document.getElementById('city').value;
    const errorDiv = document.getElementById('error-msg');
    const maxRetries = 2;
    
    try {
        errorDiv.innerHTML = '';
        
        const res = await fetch(
            `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Algeria&method=19`,
            { 
                method: 'GET', 
                mode: 'cors',
                headers: {
                    'Accept': 'application/json'
                }
            }
        );
        
        if (!res.ok) {
            throw new Error(`Erreur API: ${res.status}`);
        }
        
        const data = await res.json();
        
        if (!data || !data.data || !data.data.timings) {
            throw new Error('Format de données invalide');
        }
        
        const t = data.data.timings;
        
        // Valider et formater les horaires
        const validateTime = (time) => {
            if (!time || typeof time !== 'string') return '--:--';
            const match = time.match(/^(\d{1,2}):(\d{2})$/);
            if (!match) return '--:--';
            const h = parseInt(match[1]);
            const m = parseInt(match[2]);
            if (h < 0 || h > 23 || m < 0 || m > 59) return '--:--';
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        };
        
        const newTimes = {
            Fajr: validateTime(t.Fajr),
            Dhuhr: validateTime(t.Dhuhr),
            Asr: validateTime(t.Asr),
            Maghrib: validateTime(t.Maghrib),
            Isha: validateTime(t.Isha)
        };
        
        // Vérifier que tous les horaires sont valides
        const allValid = Object.values(newTimes).every(time => time !== '--:--');
        
        if (!allValid) {
            console.warn('Certains horaires invalides:', newTimes);
            if (retries < maxRetries) {
                console.log(`Retry ${retries + 1}/${maxRetries}...`);
                await new Promise(resolve => setTimeout(resolve, 1000));
                return loadTimes(retries + 1);
            }
            throw new Error('Horaires invalides après retry');
        }
        
        allTimes = newTimes;
        
        // Afficher les horaires
        for (let prayer of prayerOrder) {
            const elem = document.getElementById(prayer);
            if (elem) {
                elem.textContent = allTimes[prayer];
            }
        }
        
        notifiedPrayers.clear();
        updateCountdown();
        saveCity();
        loadPrayersState();
        showToast(`✓ ${city} - Horaires chargés`);
        
    } catch (error) {
        console.error('Erreur chargement:', error);
        
        if (retries < maxRetries) {
            console.log(`Retry ${retries + 1}/${maxRetries}...`);
            await new Promise(resolve => setTimeout(resolve, 1500));
            return loadTimes(retries + 1);
        }
        
        errorDiv.innerHTML = `<div class="error">⚠️ Erreur: ${error.message}</div>`;
        
        // Fallback: horaires par défaut pour Alger
        if (city === 'Algiers') {
            allTimes = {
                Fajr: '05:30',
                Dhuhr: '12:30',
                Asr: '15:45',
                Maghrib: '18:30',
                Isha: '20:15'
            };
            prayerOrder.forEach(prayer => {
                const elem = document.getElementById(prayer);
                if (elem) elem.textContent = allTimes[prayer];
            });
            showToast('Mode offline - Horaires par défaut');
        }
    }
}
